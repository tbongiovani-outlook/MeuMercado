{% extends "base.html" %}
{% block title %}Editar anúncio · Meu Mercado{% endblock %}
{% block nav %}{% include "_nav.html" %}{% endblock %}

{% block content %}
<div class="row">
    <h1>Editar anúncio</h1>
    <a class="btn btn--ghost" href="/anuncios">Voltar</a>
</div>

{% if error %}<div class="alert alert--error">{{ error }}</div>{% endif %}

<section class="card">
    <p><strong>{{ item.title }}</strong> · <code>{{ item.id }}</code></p>
    <form class="form" method="post" action="/anuncios/{{ item.id }}/editar">
        <div class="row">
            <label class="field">
                <span>Preço (R$)</span>
                <input type="number" step="0.01" min="0" name="price"
                       value="{{ item.price }}" required>
            </label>
            <label class="field">
                <span>Estoque</span>
                <input type="number" min="0" name="available_quantity"
                       value="{{ item.available_quantity }}" required>
            </label>
        </div>
        <button class="btn btn--primary" type="submit">Salvar</button>
    </form>
</section>
{% endblock %}
