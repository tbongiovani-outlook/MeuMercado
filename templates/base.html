<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Meu Mercado{% endblock %}</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <a class="skip-link" href="#conteudo">Pular para o conteúdo</a>
    <header class="topbar">
        <button class="hamburger" id="menu-toggle" aria-label="Abrir menu"
                aria-expanded="false" aria-controls="sidebar">☰</button>
        <button class="collapse-btn" id="sidebar-collapse" type="button"
                aria-label="Recolher menu" aria-pressed="false" title="Recolher menu">«</button>
        <a class="brand" href="/">🛒 Meu Mercado</a>
    </header>
    <div class="layout">
        <div class="sidebar__overlay" id="sidebar-overlay" hidden></div>
        <aside class="sidebar" id="sidebar">
            {% block nav %}{% endblock %}
        </aside>
        <main class="container" id="conteudo" tabindex="-1">
            {% block content %}{% endblock %}
            <footer class="footer">
                <small>Meu Mercado · integração com a API do Mercado Livre</small>
            </footer>
        </main>
    </div>
    <script>
        // Evita envio duplicado e dá feedback em formulários (boa prática de UX).
        document.addEventListener("submit", function (e) {
            var form = e.target;
            if (!(form instanceof HTMLFormElement)) return;
            var btn = form.querySelector('button[type="submit"], button:not([type])');
            if (btn && !btn.disabled) {
                btn.dataset.label = btn.textContent;
                btn.disabled = true;
                btn.textContent = "Enviando…";
            }
        });

        // Menu lateral responsivo (hambúrguer).
        (function () {
            var toggle = document.getElementById("menu-toggle");
            var sidebar = document.getElementById("sidebar");
            var overlay = document.getElementById("sidebar-overlay");
            if (!toggle || !sidebar) return;
            // Sem itens de menu (telas de login): esconde o botão.
            if (!sidebar.querySelector(".nav")) { toggle.style.display = "none"; return; }

            function setOpen(open) {
                sidebar.classList.toggle("sidebar--open", open);
                toggle.setAttribute("aria-expanded", open ? "true" : "false");
                toggle.setAttribute("aria-label", open ? "Fechar menu" : "Abrir menu");
                if (overlay) overlay.hidden = !open;
            }
            toggle.addEventListener("click", function () {
                setOpen(!sidebar.classList.contains("sidebar--open"));
            });
            if (overlay) overlay.addEventListener("click", function () { setOpen(false); });
            sidebar.addEventListener("click", function (e) {
                if (e.target.closest("a")) setOpen(false);
            });
            document.addEventListener("keydown", function (e) {
                if (e.key === "Escape") setOpen(false);
            });
        })();

        // Recolher a sidebar só em ícones no desktop (estado lembrado).
        (function () {
            var layout = document.querySelector(".layout");
            var btn = document.getElementById("sidebar-collapse");
            var sidebar = document.getElementById("sidebar");
            if (!layout || !btn || !sidebar || !sidebar.querySelector(".nav")) {
                if (btn) btn.style.display = "none";
                return;
            }
            function apply(collapsed) {
                layout.classList.toggle("layout--collapsed", collapsed);
                btn.setAttribute("aria-pressed", collapsed ? "true" : "false");
                btn.setAttribute("aria-label", collapsed ? "Expandir menu" : "Recolher menu");
                btn.title = collapsed ? "Expandir menu" : "Recolher menu";
                btn.textContent = collapsed ? "»" : "«";
            }
            apply(localStorage.getItem("mm_sidebar_collapsed") === "1");
            btn.addEventListener("click", function () {
                var collapsed = !layout.classList.contains("layout--collapsed");
                localStorage.setItem("mm_sidebar_collapsed", collapsed ? "1" : "0");
                apply(collapsed);
            });
        })();

        // Respostas rápidas: preenche o campo de texto ao escolher um template.
        (function () {
            document.addEventListener("change", function (e) {
                var sel = e.target;
                if (!sel.classList || !sel.classList.contains("reply__tpl")) return;
                if (!sel.value) return;
                var form = sel.closest("form");
                if (!form) return;
                var campo = form.querySelector('input[name="text"], textarea[name="text"]');
                if (campo) {
                    campo.value = sel.value;
                    campo.focus();
                }
                sel.selectedIndex = 0;
            });
        })();

        // Edição em massa: "selecionar todos".
        (function () {
            var all = document.getElementById("check-all");
            if (!all) return;
            var boxes = document.querySelectorAll('input[name="item_ids"]');
            all.addEventListener("change", function () {
                boxes.forEach(function (b) { b.checked = all.checked; });
            });
        })();
    </script>
</body>
</html>
